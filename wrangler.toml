name = "text"
main = "src/worker.js"
compatibility_date = "2024-01-13"
workers_dev = true

# R2 对象存储（主数据 + 备份 + 认证信息）
# 部署前需创建: npx wrangler r2 bucket create 2fa-backup
[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "2fa-backup"

# 定时备份 - 每天北京 0:00
[triggers]
crons = ["0 16 * * *"]

[vars]
SW_VERSION = "v2"
